name: Bug report
description: Report a reproducible bug in antigravity-bus
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug.

        Please redact sensitive paths, IDs, tokens, and task content before attaching logs or snapshots.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the observed bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command and what happened next.
      placeholder: |
        1. Run `node ./src/index.mjs snapshot --cwd ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: 20.x or 22.x
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS and version
      placeholder: macOS 15.x
    validations:
      required: true
  - type: dropdown
    id: sqlite3
    attributes:
      label: Is sqlite3 available on your PATH?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or snapshot excerpt
      description: Share only the minimum redacted output needed to diagnose the problem.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include any local Antigravity assumptions or environment details that matter.
